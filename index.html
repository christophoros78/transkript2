<!DOCTYPE html>
<html>
<head>
  <title>YouTube Transcript PRO</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 40px auto; }
    textarea { width: 100%; height: 300px; }
    button { padding: 10px; margin-top: 10px; cursor: pointer; }
  </style>
</head>
<body>

<h2>🎥 YouTube → Transkrypt PRO</h2>

<input id="url" style="width:100%" placeholder="Wklej link YouTube">
<br><br>

<button onclick="getTranscript()">Pobierz transkrypt</button>

<h3>Transkrypt:</h3>
<textarea id="output"></textarea><br>

<button onclick="copyText()">📋 Kopiuj</button>

<script>
function extractVideoID(url) {
  const match = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
  return match ? match[1] : null;
}

// PRO FIX: lepsze źródło transkryptu
async function getTranscript() {
  const url = document.getElementById("url").value;
  const videoId = extractVideoID(url);

  if (!videoId) {
    alert("Nieprawidłowy link");
    return;
  }

  document.getElementById("output").value = "Ładowanie...";

  try {
    // 1. próbujemy oficjalny caption endpoint (bardziej stabilny)
    const res = await fetch(`https://video.google.com/timedtext?lang=en&v=${videoId}`);
    const xml = await res.text();

    let parser = new DOMParser();
    let xmlDoc = parser.parseFromString(xml, "text/xml");
    let texts = xmlDoc.getElementsByTagName("text");

    let output = [];

    for (let i = 0; i < texts.length; i++) {
      output.push(texts[i].textContent);
    }

    if (output.length === 0) {
      throw new Error("Brak napisów");
    }

    document.getElementById("output").value = output.join(" ");

  } catch (e) {
    document.getElementById("output").value =
      "❌ Brak dostępnych napisów dla tego filmu lub są zablokowane.";
  }
}

function copyText() {
  const textarea = document.getElementById("output");
  textarea.select();
  document.execCommand("copy");
  alert("Skopiowano!");
}
</script>

</body>
</html>
